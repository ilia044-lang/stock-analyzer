{% include "index.html" %}
<!-- ===== Nimbus redesign layer (does not modify index.html) ===== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

/* ══════════════════════════════════════════════════════════
   NIMBUS REDESIGN — new Apple design language (additive layer)
   Keeps 100% of the original DOM & JS; upgrades visuals only.
   ══════════════════════════════════════════════════════════ */
:root{
  --r-sm:12px; --r-md:16px; --r-lg:20px; --r-xl:26px;
  --shadow:0 4px 16px rgba(0,0,0,.06),0 18px 44px rgba(0,0,0,.06);
  --shadow-sm:0 1px 2px rgba(0,0,0,.03),0 2px 8px rgba(0,0,0,.05);
}
body{
  font-family:'Rubik',-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',system-ui,Arial,sans-serif!important;
  letter-spacing:-.01em;
  background:#f5f5f7!important;
  background-image:radial-gradient(ellipse 90% 50% at 50% -4%,rgba(0,113,227,.06),transparent 60%)!important;
}
header{
  background:rgba(245,245,247,.82)!important;
  backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);
  border-bottom:1px solid rgba(0,0,0,.07)!important;box-shadow:none!important;padding:14px 28px!important;
}
header h1{font-weight:700!important;letter-spacing:-.03em!important}

/* section headers → zone style with accent bar */
.section-title{position:relative;font-weight:700!important;letter-spacing:-.02em!important;padding-inline-start:13px!important}
.section-title::before{content:"";position:absolute;inset-inline-start:0;top:.15em;width:4px;height:1em;border-radius:3px;background:var(--blue)}

/* cards → rounded + soft shadow + hover lift */
.mcard,.cl-box,.pf-card,.pf-stat-card,.diag-col,.ot-box,.dip-rule,.pf-hs{
  border-radius:var(--r-lg)!important;box-shadow:var(--shadow-sm)!important;
  border:1px solid rgba(0,0,0,.06)!important;transition:box-shadow .25s ease,transform .25s ease;
}
.mcard:hover,.pf-card:hover,.pf-stat-card:hover,.cl-box:hover{box-shadow:var(--shadow)!important;transform:translateY(-2px)}

/* tab bar */
.app-tab-btn{border-radius:12px!important;font-weight:600!important;transition:.2s}
.app-tab-btn.active{background:var(--bg2)!important;box-shadow:var(--shadow-sm)!important;color:var(--label)!important}

/* pill buttons */
.style-btn,.period-btn,.world-tab{border-radius:980px!important;font-weight:600!important;transition:.2s}
.style-btn.active-style,.period-btn.active-period,.world-tab.active{background:var(--blue)!important;color:#fff!important;border-color:transparent!important}

/* primary CTAs → Apple blue */
.pf-btn-primary,#analyzeBtn,.scan-btn,#analyzePredBtn{
  background:var(--blue)!important;color:#fff!important;border:none!important;
  border-radius:14px!important;font-weight:700!important;box-shadow:0 4px 14px rgba(0,113,227,.22)!important;transition:.2s;
}
.pf-btn-primary:hover,#analyzeBtn:hover,.scan-btn:hover{filter:brightness(1.05);transform:translateY(-1px)}
.pf-btn-secondary{border-radius:12px!important;font-weight:600!important}

/* inputs */
input,select,textarea{border-radius:12px!important}
.search-box input{border-radius:16px!important;font-weight:600}

/* tables */
.pf-tbl th{font-weight:700!important;text-transform:uppercase;font-size:11px!important;letter-spacing:.03em}
.pf-tbl td,.pf-tbl th{border-color:rgba(0,0,0,.06)!important}
.pf-tbl-wrap{border-radius:var(--r-md)!important;overflow:hidden;border:1px solid rgba(0,0,0,.06)!important}

/* stat cards */
.pf-stat-value{letter-spacing:-.03em!important;font-weight:800!important}
</style>
