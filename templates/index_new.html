{% include "index.html" %}
<!-- ===== Nimbus FX — animated glass theme (additive; never hides dynamic content) ===== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --fx-a1:#10b981; --fx-a2:#0ea5e9; --fx-a3:#6366f1;
  --fx-grad:linear-gradient(120deg,var(--fx-a1),var(--fx-a2) 55%,var(--fx-a3));
  --bg:transparent!important; --bg2:rgba(255,255,255,.72)!important; --bg3:rgba(255,255,255,.55)!important; --bg4:rgba(255,255,255,.85)!important;
  --label:#0b1220!important; --label2:#475569!important; --label3:#7c8aa0!important;
  --blue:#0ea5e9!important; --green:#10b981!important; --red:#ef4444!important;
  --sep:rgba(15,23,42,.10)!important; --sep2:rgba(15,23,42,.06)!important;
  --r-sm:14px;--r-md:18px;--r-lg:22px;--r-xl:26px;
}
html{scroll-behavior:smooth}
body{font-family:'Rubik',system-ui,Arial,sans-serif!important;letter-spacing:-.01em;background:#eef2f8!important;position:relative;overflow-x:hidden}
body::before{content:"";position:fixed;inset:-20% -10% -10% -10%;z-index:-2;pointer-events:none;
  background:
    radial-gradient(38% 40% at 18% 12%, rgba(16,185,129,.30), transparent 60%),
    radial-gradient(34% 38% at 82% 8%, rgba(14,165,233,.28), transparent 62%),
    radial-gradient(40% 44% at 72% 88%, rgba(99,102,241,.24), transparent 60%),
    radial-gradient(34% 40% at 12% 82%, rgba(16,185,129,.18), transparent 60%);
  filter:blur(20px);animation:fxfloat 18s ease-in-out infinite alternate}
body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background:linear-gradient(180deg,rgba(238,242,248,.4),rgba(238,242,248,.85))}
@keyframes fxfloat{0%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(-3%,2%,0) scale(1.06)}100%{transform:translate3d(3%,-2%,0) scale(1.03)}}
@media(prefers-reduced-motion:reduce){body::before{animation:none}*{animation-duration:.001ms!important}}

.mcard,.cl-box,.pf-card,.pf-stat-card,.diag-col,.ot-box,.dip-rule,.pf-hs{
  background:rgba(255,255,255,.68)!important;backdrop-filter:blur(18px) saturate(150%);-webkit-backdrop-filter:blur(18px) saturate(150%);
  border:1px solid rgba(255,255,255,.6)!important;border-radius:var(--r-lg)!important;
  box-shadow:0 8px 24px rgba(15,23,42,.06),0 2px 8px rgba(15,23,42,.04),inset 0 1px 0 rgba(255,255,255,.7)!important;
  transition:transform .35s cubic-bezier(.2,.8,.2,1),box-shadow .35s,border-color .35s!important;position:relative;overflow:hidden}
.mcard:hover,.pf-card:hover,.pf-stat-card:hover,.cl-box:hover{
  transform:translateY(-6px) scale(1.008)!important;
  box-shadow:0 20px 44px rgba(16,185,129,.14),0 8px 20px rgba(15,23,42,.08),inset 0 1px 0 rgba(255,255,255,.8)!important;
  border-color:rgba(16,185,129,.35)!important}
.mcard::after,.pf-card::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent);transform:skewX(-18deg);transition:left .7s ease;pointer-events:none}
.mcard:hover::after,.pf-card:hover::after{left:130%}

header{background:rgba(255,255,255,.55)!important;backdrop-filter:blur(22px) saturate(160%)!important;
  border-bottom:1px solid rgba(255,255,255,.6)!important;box-shadow:0 4px 30px rgba(15,23,42,.06)!important}
header h1{background:var(--fx-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  font-weight:800!important;letter-spacing:-.03em!important;background-size:200% auto;animation:fxshine 6s linear infinite}
@keyframes fxshine{to{background-position:200% center}}

.cl-num,.cl-price,.pf-stat-value,.pf-hs-val{font-family:'Fira Code',ui-monospace,monospace!important;font-variant-numeric:tabular-nums}

.section-title{position:relative;font-weight:800!important;letter-spacing:-.02em!important;padding-inline-start:16px!important}
.section-title::before{content:"";position:absolute;inset-inline-start:0;top:.1em;width:5px;height:1.05em;border-radius:4px;
  background:var(--fx-grad);box-shadow:0 0 12px rgba(16,185,129,.5);animation:fxpulse 2.6s ease-in-out infinite}
@keyframes fxpulse{0%,100%{opacity:1}50%{opacity:.55}}

.style-btn,.period-btn,.world-tab,.app-tab-btn{border-radius:980px!important;font-weight:600!important;transition:.25s!important}
.style-btn.active-style,.period-btn.active-period,.world-tab.active{background:var(--fx-grad)!important;color:#fff!important;border-color:transparent!important;box-shadow:0 6px 18px rgba(16,185,129,.35)!important}
.app-tab-btn.active{background:rgba(255,255,255,.9)!important;box-shadow:0 4px 14px rgba(15,23,42,.1)!important}
.pf-btn-primary,#analyzeBtn,.scan-btn,#analyzePredBtn{position:relative;overflow:hidden;background:var(--fx-grad)!important;color:#fff!important;border:none!important;
  border-radius:14px!important;font-weight:700!important;box-shadow:0 8px 22px rgba(16,185,129,.32)!important;transition:transform .2s,box-shadow .2s!important}
.pf-btn-primary:hover,#analyzeBtn:hover,.scan-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 12px 28px rgba(16,185,129,.42)!important}
.pf-btn-primary::before,#analyzeBtn::before,.scan-btn::before{content:"";position:absolute;top:0;left:-70%;width:50%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.55),transparent);transform:skewX(-18deg);transition:left .6s}
.pf-btn-primary:hover::before,#analyzeBtn:hover::before,.scan-btn:hover::before{left:150%}

input,select,textarea{border-radius:14px!important;background:rgba(255,255,255,.7)!important}
.search-box input{border-radius:18px!important;font-weight:600}
.search-box input:focus{box-shadow:0 0 0 4px rgba(16,185,129,.18)!important;border-color:var(--fx-a1)!important}
.pf-tbl-wrap{border-radius:var(--r-md)!important;overflow:hidden;background:rgba(255,255,255,.6)!important;backdrop-filter:blur(12px)}
.pf-tbl th{font-weight:700!important;text-transform:uppercase;font-size:11px!important;letter-spacing:.03em}
:focus-visible{outline:2px solid var(--fx-a1);outline-offset:2px;border-radius:6px}
button,[onclick],a{cursor:pointer}

/* one-time entrance for elements PRESENT AT LOAD only. End state is fully visible,
   so if JS never runs, everything is still shown. Never touches dynamic content. */
@keyframes fxIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
.fx-enter{animation:fxIn .6s cubic-bezier(.2,.8,.2,1) both}
</style>
<script>
(function(){
  if(matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  function play(){
    // animate ONLY the top-level sections already in the DOM at load; one-time, no observers.
    var main=document.querySelector('main')||document.body;
    var kids=Array.prototype.slice.call(main.children).filter(function(el){
      return el.offsetParent!==null && el.getBoundingClientRect().height>10;
    }).slice(0,14);
    kids.forEach(function(el,i){ el.style.animationDelay=(i*60)+'ms'; el.classList.add('fx-enter'); });
  }
  if(document.readyState!=='loading')play();else document.addEventListener('DOMContentLoaded',play);
})();
</script>

<!-- ===== Sector hover → top-4 rising stocks tooltip ===== -->
<style>
#fxSecTip{position:fixed;z-index:9999;min-width:210px;max-width:260px;pointer-events:none;opacity:0;
  transform:translateY(6px);transition:opacity .16s ease,transform .16s ease;
  background:rgba(255,255,255,.86);backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1px solid rgba(255,255,255,.7);border-radius:16px;
  box-shadow:0 18px 44px rgba(15,23,42,.18),0 4px 12px rgba(15,23,42,.1);padding:12px 13px;font-family:'Rubik',system-ui,sans-serif;direction:rtl}
#fxSecTip.show{opacity:1;transform:translateY(0)}
#fxSecTip .h{font-size:12.5px;font-weight:800;color:#0b1220;margin-bottom:9px;display:flex;align-items:center;gap:6px}
#fxSecTip .h::before{content:"";width:4px;height:14px;border-radius:3px;background:linear-gradient(120deg,#10b981,#0ea5e9)}
#fxSecTip .r{display:flex;align-items:center;gap:8px;padding:5px 0;border-top:1px solid rgba(15,23,42,.07)}
#fxSecTip .r:first-of-type{border-top:none}
#fxSecTip .r .rk{width:18px;height:18px;border-radius:6px;display:grid;place-items:center;font-size:10px;font-weight:800;color:#fff;background:linear-gradient(120deg,#10b981,#0ea5e9);flex-shrink:0}
#fxSecTip .r .tk{font-family:'Fira Code',monospace;font-weight:700;font-size:13px;color:#0b1220}
#fxSecTip .r .pr{font-family:'Fira Code',monospace;font-size:11px;color:#7c8aa0}
#fxSecTip .r .ch{margin-inline-start:auto;font-family:'Fira Code',monospace;font-weight:700;font-size:13px}
#fxSecTip .up{color:#059669}#fxSecTip .dn{color:#dc2626}
#fxSecTip .ld{font-size:12px;color:#7c8aa0;text-align:center;padding:6px 0}
#sectorsList > div{cursor:pointer;transition:transform .15s ease,box-shadow .15s ease}
#sectorsList > div:hover{transform:translateX(-3px)}
</style>
<script>
(function(){
  var MAP={'טכנולוגיה':'XLK','פיננסים':'XLF','אנרגיה':'XLE','בריאות':'XLV','תעשייה':'XLI','מחזורית':'XLY','בסיסית':'XLP','תקשורת':'XLC','נדל':'XLRE','חומרי גלם':'XLB','שירותים':'XLU'};
  var NAMES={'XLK':'טכנולוגיה 💻','XLF':'פיננסים 🏦','XLE':'אנרגיה ⛽','XLV':'בריאות 🏥','XLI':'תעשייה 🏭','XLY':'צרכנות מחזורית 🛍️','XLP':'צרכנות בסיסית 🛒','XLC':'תקשורת 📡','XLRE':'נדל״ן 🏠','XLB':'חומרי גלם 🪨','XLU':'שירותים ⚡'};
  var cache={},tip;
  function ensure(){ if(!tip){tip=document.createElement('div');tip.id='fxSecTip';document.body.appendChild(tip);} return tip; }
  function etfFor(txt){ for(var k in MAP){ if(txt.indexOf(k)>=0) return MAP[k]; } return null; }
  function render(etf){
    var e=ensure(); var d=cache[etf];
    var head='<div class="h">'+(NAMES[etf]||'')+' · המובילות היום</div>';
    if(d==='loading'){ e.innerHTML=head+'<div class="ld">טוען מניות…</div>'; return; }
    if(!d||!d.length){ e.innerHTML=head+'<div class="ld">אין נתונים כרגע</div>'; return; }
    e.innerHTML=head+d.map(function(s,i){
      var up=s.change_pct>=0; var sign=up?'+':'';
      return '<div class="r"><span class="rk">'+(i+1)+'</span><span class="tk">'+s.ticker+'</span>'+
             '<span class="pr">$'+s.price+'</span>'+
             '<span class="ch '+(up?'up':'dn')+'">'+sign+s.change_pct+'%</span></div>';
    }).join('');
  }
  function load(etf){
    if(cache[etf]&&cache[etf]!=='loading') return Promise.resolve();
    cache[etf]='loading'; render(etf);
    return fetch('/sector-leaders?etf='+etf).then(function(r){return r.json();})
      .then(function(j){ cache[etf]=(j&&j.leaders)||[]; render(etf); })
      .catch(function(){ cache[etf]=[]; render(etf); });
  }
  function pos(x,y){ var e=ensure(),w=e.offsetWidth||230,h=e.offsetHeight||160;
    var L=x-w-16; if(L<8) L=x+16; var T=y-10; if(T+h>innerHeight-8)T=innerHeight-h-8; if(T<8)T=8;
    e.style.left=L+'px'; e.style.top=T+'px'; }
  function bind(){
    var list=document.getElementById('sectorsList'); if(!list||list.__fxb) return; list.__fxb=1;
    function rowOf(t){ while(t&&t.parentElement!==list) t=t.parentElement; return (t&&t.parentElement===list)?t:null; }
    list.addEventListener('mouseover',function(e){ var row=rowOf(e.target); if(!row)return;
      var etf=etfFor(row.textContent||''); if(!etf)return; ensure().classList.add('show'); load(etf).then(function(){render(etf);}); render(etf); pos(e.clientX,e.clientY); });
    list.addEventListener('mousemove',function(e){ if(tip&&tip.classList.contains('show')) pos(e.clientX,e.clientY); });
    list.addEventListener('mouseleave',function(){ if(tip) tip.classList.remove('show'); });
  }
  // #sectorsList is filled async by the live-data JS — poll briefly to bind once it exists.
  var tries=0,iv=setInterval(function(){ bind(); if(++tries>40||(document.getElementById('sectorsList')&&document.getElementById('sectorsList').__fxb)) clearInterval(iv); },500);
  if(document.readyState!=='loading')bind();else document.addEventListener('DOMContentLoaded',bind);
})();
</script>

<!-- ===== ICT analysis window (per analyzed stock) ===== -->
<style>
#fxIct{margin:20px 0;border-radius:22px;overflow:hidden;position:relative;
  background:rgba(255,255,255,.72);backdrop-filter:blur(18px) saturate(150%);-webkit-backdrop-filter:blur(18px) saturate(150%);
  border:1px solid rgba(255,255,255,.7);box-shadow:0 12px 34px rgba(15,23,42,.1),inset 0 1px 0 rgba(255,255,255,.7);direction:rtl}
#fxIct .top{display:flex;align-items:center;gap:10px;padding:15px 18px;color:#fff;
  background:linear-gradient(120deg,#0f172a,#155e75 60%,#0e7490)}
#fxIct .top h3{font-family:'Rubik',sans-serif;font-size:16px;font-weight:800;margin:0}
#fxIct .top .tk{font-family:'Fira Code',monospace;font-weight:700;opacity:.9}
#fxIct .top .badge{margin-inline-start:auto;font-size:11.5px;font-weight:700;padding:5px 12px;border-radius:999px}
#fxIct .badge.ok{background:rgba(16,185,129,.25);color:#d1fae5;border:1px solid rgba(16,185,129,.5)}
#fxIct .badge.wait{background:rgba(234,179,8,.22);color:#fef9c3;border:1px solid rgba(234,179,8,.5)}
#fxIct .body{padding:16px 18px}
#fxIct .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
#fxIct .chip{font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;background:rgba(15,23,42,.05);color:#334155;border:1px solid rgba(15,23,42,.08)}
#fxIct .chip.kz{background:rgba(14,165,233,.12);color:#0369a1;border-color:rgba(14,165,233,.3)}
#fxIct .chip.zone{background:rgba(99,102,241,.12);color:#4338ca;border-color:rgba(99,102,241,.3)}
#fxIct .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
#fxIct .cell{background:rgba(255,255,255,.7);border:1px solid rgba(15,23,42,.08);border-radius:14px;padding:12px;text-align:center}
#fxIct .cell .l{font-size:11px;color:#7c8aa0;font-weight:600;margin-bottom:5px}
#fxIct .cell .v{font-family:'Fira Code',monospace;font-size:18px;font-weight:800;letter-spacing:-.02em}
#fxIct .cell.entry .v{color:#0e7490}#fxIct .cell.stop .v{color:#dc2626}#fxIct .cell.tgt .v{color:#059669}#fxIct .cell.rr .v{color:#4338ca}
#fxIct .expl{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){ #fxIct .grid{grid-template-columns:1fr 1fr}#fxIct .expl{grid-template-columns:1fr}}
#fxIct .box{background:rgba(255,255,255,.6);border:1px solid rgba(15,23,42,.07);border-radius:14px;padding:12px 14px}
#fxIct .box .bl{font-size:11.5px;font-weight:800;color:#0e7490;margin-bottom:5px;display:flex;align-items:center;gap:6px}
#fxIct .box .bt{font-size:12.5px;color:#334155;line-height:1.6}
#fxIct .lvls{font-size:11.5px;color:#64748b;margin-top:12px;font-family:'Fira Code',monospace;display:flex;flex-wrap:wrap;gap:12px}
#fxIct .disc{font-size:10.5px;color:#94a3b8;margin-top:10px;text-align:center}
#fxIct .ldg{padding:24px;text-align:center;color:#7c8aa0;font-size:13px}
#fxIct .ictc{position:relative;background:rgba(255,255,255,.6);border:1px solid rgba(15,23,42,.07);border-radius:14px;padding:6px 4px;margin-bottom:2px}
#fxIct .icttip{position:absolute;top:3px;transform:translateX(-50%);background:#0f172a;color:#fff;font-family:'Fira Code',monospace;font-size:11px;padding:2px 7px;border-radius:6px;opacity:0;pointer-events:none;transition:opacity .1s;white-space:nowrap}
</style>
<script>
(function(){
  var last=null, panel=null, busy=false;
  function fmt(v){return (v===null||v===undefined||v!==v)?'—':('$'+v);}
  function build(){
    if(panel) return panel;
    panel=document.createElement('div'); panel.id='fxIct';
    var tc=document.getElementById('tradeCard');
    if(tc&&tc.parentNode){ tc.parentNode.insertBefore(panel, tc.nextSibling); }
    else return null;
    return panel;
  }
  function loading(tk){ var p=build(); if(!p)return; p.innerHTML='<div class="top"><h3>🎯 ניתוח ICT</h3><span class="tk">'+tk+'</span></div><div class="ldg">מחשב מבנה שוק, FVG ו-Killzone…</div>'; }
  function render(d){
    var p=build(); if(!p)return;
    var okc = d.valid ? 'ok' : 'wait';
    var okt = d.valid ? '✓ תנאי מבנה מתקיים' : '⏳ המתן לאישור';
    var sideTxt = d.side==='long'?'Long (קנייה)':d.side==='short'?'Short (מכירה)':'טווח (המתנה)';
    var fvgTxt = d.fvg ? ('FVG '+(d.fvg.type==='bull'?'שורי':'דובי')+' $'+d.fvg.bot+'–$'+d.fvg.top) : 'אין FVG טרי';
    p.innerHTML =
     '<div class="top"><h3>🎯 ניתוח ICT — Inner Circle Trader</h3><span class="tk">'+d.ticker+'</span>'+
       '<span class="badge '+okc+'">'+okt+'</span></div>'+
     '<div class="body">'+
       '<div class="chips">'+
         '<span class="chip">Bias: <b>'+d.bias+'</b></span>'+
         '<span class="chip zone">'+d.zone+'</span>'+
         '<span class="chip kz">⏱ '+d.killzone+'</span>'+
         '<span class="chip">כיוון: <b>'+sideTxt+'</b></span>'+
       '</div>'+
       '<div class="grid">'+
         '<div class="cell entry"><div class="l">💰 כניסה</div><div class="v">'+fmt(d.entry)+'</div></div>'+
         '<div class="cell stop"><div class="l">🛑 סטופ</div><div class="v">'+fmt(d.stop)+'</div></div>'+
         '<div class="cell tgt"><div class="l">🎯 יעד</div><div class="v">'+fmt(d.target)+'</div></div>'+
         '<div class="cell rr"><div class="l">⚖️ R:R</div><div class="v">1:'+d.rr+'</div></div>'+
       '</div>'+
       '<div id="fxIctChartWrap"></div>'+
       '<div class="expl">'+
         '<div class="box"><div class="bl">⏱ מתי להיכנס</div><div class="bt">'+d.killzone+'. כניסה רק בתוך ה-Killzone ואחרי איסוף נזילות (Sweep).</div></div>'+
         '<div class="box"><div class="bl">🎬 איך</div><div class="bt">'+d.how+'</div></div>'+
       '</div>'+
       '<div class="box" style="margin-top:12px"><div class="bl">💡 למה</div><div class="bt">'+d.why+'. '+fvgTxt+'. אזור OTE (פיבו 62–79%): $'+d.ote_low+'–$'+d.ote_high+'.</div></div>'+
       '<div class="lvls"><span>PDH: $'+d.pdh+'</span><span>PDL: $'+d.pdl+'</span><span>OTE: $'+d.ote_low+'–$'+d.ote_high+'</span></div>'+
       '<div class="disc">שיטת ICT (Michael J. Huddleston) · אוטומטי מנתוני מחיר · לא ייעוץ השקעות</div>'+
     '</div>';
    drawIctChart(d);
  }
  function drawIctChart(d){
    var wrap=document.getElementById('fxIctChartWrap'); if(!wrap)return;
    var s=d.series||[]; if(s.length<3){wrap.innerHTML='';return;}
    var W=600,Hh=180,pl=6,pr=58,pt=10,pb=16;
    var lv=[d.entry,d.stop,d.target,d.ote_low,d.ote_high].filter(function(v){return typeof v==='number'&&v===v;});
    var lo=Math.min.apply(null,s.concat(lv)),hi=Math.max.apply(null,s.concat(lv));
    var pd=(hi-lo)*0.06||1; lo-=pd; hi+=pd;
    var X=function(i){return pl+i*((W-pl-pr)/(s.length-1));};
    var Y=function(v){return pt+(hi-v)/(hi-lo)*(Hh-pt-pb);};
    function hl(v,c,dash,lab){ if(typeof v!=='number'||v!==v)return '';var y=Y(v).toFixed(1);
      return '<line x1="'+pl+'" y1="'+y+'" x2="'+(W-pr)+'" y2="'+y+'" stroke="'+c+'" stroke-width="1.3" stroke-dasharray="'+dash+'" opacity=".9"/>'+
             '<text x="'+(W-pr+4)+'" y="'+(+y+3)+'" font-size="10" font-family="Fira Code,monospace" fill="'+c+'">'+lab+' '+v+'</text>'; }
    var path=''; s.forEach(function(v,i){path+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' ';});
    var area=path+'L'+X(s.length-1).toFixed(1)+' '+(Hh-pb)+' L'+pl+' '+(Hh-pb)+' Z';
    var band=''; if(typeof d.ote_low==='number'&&typeof d.ote_high==='number'){var a=Y(d.ote_high),b=Y(d.ote_low);
      band='<rect x="'+pl+'" y="'+Math.min(a,b).toFixed(1)+'" width="'+(W-pl-pr)+'" height="'+Math.abs(b-a).toFixed(1)+'" fill="rgba(99,102,241,.12)"/>';}
    wrap.innerHTML='<div class="ictc"><svg viewBox="0 0 '+W+' '+Hh+'" preserveAspectRatio="none" width="100%" height="180" style="display:block">'+
      '<defs><linearGradient id="ictg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0e7490" stop-opacity=".22"/><stop offset="1" stop-color="#0e7490" stop-opacity="0"/></linearGradient></defs>'+
      band+'<path d="'+area+'" fill="url(#ictg)"/><path d="'+path+'" fill="none" stroke="#0e7490" stroke-width="2" stroke-linejoin="round"/>'+
      hl(d.target,'#059669','5 4','יעד')+hl(d.entry,'#0ea5e9','1 0','כניסה')+hl(d.stop,'#dc2626','5 4','סטופ')+
      '<circle cx="'+X(s.length-1).toFixed(1)+'" cy="'+Y(s[s.length-1]).toFixed(1)+'" r="3.5" fill="#0e7490"/>'+
      '<line id="ictcx" x1="0" y1="'+pt+'" x2="0" y2="'+(Hh-pb)+'" stroke="#334155" stroke-width="1" opacity="0"/>'+
      '<rect id="ictov" x="0" y="0" width="'+W+'" height="'+Hh+'" fill="transparent" style="cursor:crosshair"/></svg>'+
      '<div class="icttip" id="icttip"></div></div>';
    var svg=wrap.querySelector('svg'),cx=wrap.querySelector('#ictcx'),tip=wrap.querySelector('#icttip'),ov=wrap.querySelector('#ictov');
    ov.addEventListener('mousemove',function(e){var r=svg.getBoundingClientRect();var px=(e.clientX-r.left)/r.width*W;
      var step=(W-pl-pr)/(s.length-1);var idx=Math.round((px-pl)/step);idx=Math.max(0,Math.min(s.length-1,idx));
      var xx=X(idx);cx.setAttribute('x1',xx);cx.setAttribute('x2',xx);cx.setAttribute('opacity','.5');
      tip.style.opacity=1;tip.style.left=((xx/W)*r.width)+'px';tip.textContent='$'+s[idx];});
    ov.addEventListener('mouseleave',function(){cx.setAttribute('opacity','0');tip.style.opacity=0;});
  }
  function fail(tk,msg){ var p=build(); if(!p)return;
    p.innerHTML='<div class="top"><h3>🎯 ניתוח ICT</h3><span class="tk">'+tk+'</span></div><div class="ldg">'+(msg||'לא ניתן לחשב ICT למניה זו כרגע. נסה שוב בעוד רגע.')+'<br><button onclick="window.__ictRetry&&window.__ictRetry()" style="margin-top:10px;background:linear-gradient(120deg,#10b981,#0ea5e9);color:#fff;border:none;border-radius:10px;padding:6px 16px;font-weight:700;cursor:pointer;font-family:Rubik,sans-serif">נסה שוב</button></div>'; }
  function load(tk){
    if(busy)return; busy=true; loading(tk);
    window.__ictRetry=function(){ busy=false; last=null; load(tk); };
    var ctrl=('AbortController' in window)?new AbortController():null;
    var to=setTimeout(function(){ if(ctrl)ctrl.abort(); },22000);
    fetch('/ict?ticker='+encodeURIComponent(tk), ctrl?{signal:ctrl.signal}:{})
      .then(function(r){ return r.json(); })
      .then(function(j){ clearTimeout(to); busy=false;
        if(j && !j.error && j.entry!==undefined){ render(j); }
        else { fail(tk, (j&&j.error)?'אין מספיק נתונים ל-ICT עבור מניה זו.':null); } })
      .catch(function(){ clearTimeout(to); busy=false; fail(tk); });
  }
  setInterval(function(){
    var tk=window._currentTicker;
    if(tk && tk!==last && document.getElementById('tradeCard')){ last=tk; load(tk); }
  }, 700);
})();
</script>

<script>
(function(){
  var panel=null, built=false, running=false;
  function build(){ if(built)return panel; var tab=document.getElementById('tabAnalysis'); if(!tab)return null;
    panel=document.createElement('div'); panel.id='fxScan'; tab.insertBefore(panel, tab.firstChild); built=true; idle(); return panel; }
  function head(kz){ return '<div class="top"><h3>🎯 סורק ICT — setups מוכנים עכשיו</h3><span class="kz">'+(kz||'⏱ סורק מניות במגמת עלייה באזור כניסה')+'</span></div>'; }
  function idle(){ var p=build(); if(!p)return; p.innerHTML=head()+'<div class="body"><button class="sbtn" onclick="window.__ictScan&&window.__ictScan()">🔍 סרוק עכשיו</button><div class="meta">סורק ~46 מניות מובילות ומחזיר את אלה במגמת עלייה שנמצאות עכשיו באזור כניסה (תיקון לתמיכה).</div></div>'; }
  function loading(){ var p=build(); if(!p)return; p.innerHTML=head()+'<div class="ld">סורק מניות… מחשב מבנה שוק ואזורי כניסה (עד ~15 שנ׳)</div>'; }
  function render(d){
    var p=build(); if(!p)return;
    var m=d.matches||[];
    var rows = m.length? ('<div class="tblwrap"><table><thead><tr><th>מניה</th><th>כיוון</th><th>מחיר</th><th>כניסה</th><th>סטופ</th><th>יעד</th><th>R:R</th><th></th></tr></thead><tbody>'+
      m.map(function(x){return '<tr><td><span class="tk">'+x.ticker+'</span></td><td><span class="lg">LONG</span></td>'+
        '<td class="num">$'+x.price+'</td><td class="num up">$'+x.entry+'</td><td class="num dn">$'+x.stop+'</td><td class="num up">$'+x.target+'</td>'+
        '<td class="num" style="font-weight:800">1:'+x.rr+'</td>'+
        '<td><button class="go" onclick="if(window.setTicker){setTicker(\''+x.ticker+'\');window.scrollTo({top:420,behavior:\'smooth\'});}">נתח ›</button></td></tr>';}).join('')+
      '</tbody></table></div>')
      : '<div class="ld">אין setups מוכנים כרגע — רוב המניות מורחקות מאזור הכניסה. נסה שוב מאוחר יותר.</div>';
    p.innerHTML=head(d.killzone)+'<div class="body">'+rows+
      '<div class="meta">נסרקו '+d.scanned+' מניות · נמצאו '+d.found+' · עודכן '+d.time+' · '+
      '<a href="javascript:void(0)" onclick="window.__ictScan&&window.__ictScan()" style="color:#0e7490;font-weight:700">רענן</a></div></div>';
  }
  window.__ictScan=function(){
    if(running)return; running=true; loading();
    var ctrl=('AbortController' in window)?new AbortController():null; var to=setTimeout(function(){if(ctrl)ctrl.abort();},30000);
    fetch('/ict-scan', ctrl?{signal:ctrl.signal}:{}).then(function(r){return r.json();}).then(function(j){ clearTimeout(to); running=false; render(j); })
      .catch(function(){ clearTimeout(to); running=false; var p=build(); if(p)p.innerHTML=head()+'<div class="ld">הסריקה נכשלה. <a href="javascript:void(0)" onclick="window.__ictScan()" style="color:#0e7490;font-weight:700">נסה שוב</a></div>'; });
  };
  function init(){ if(build()){ setTimeout(window.__ictScan, 1200); } }
  if(document.readyState!=='loading')init();else document.addEventListener('DOMContentLoaded',init);
})();
</script>
